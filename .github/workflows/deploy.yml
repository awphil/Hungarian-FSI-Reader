name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # This site is deployed under <user>.github.io/<repo>/ so Vite's `base`
      # must be prefixed with /<repo>/. Change this if you use a custom domain.
      - name: Set base path for GitHub Pages
        run: echo "VITE_BASE_PATH=/${{ github.event.repository.name }}/" >> $GITHUB_ENV

      # Set to your Release download URL prefix in the repo secrets
      # (Settings → Secrets and variables → Actions → New repository variable
      #  named AUDIO_BASE_URL). Example:
      #   https://github.com/USER/REPO/releases/download/audio-v1/
      - name: Set audio base URL
        if: vars.AUDIO_BASE_URL != ''
        run: echo "VITE_AUDIO_BASE_URL=${{ vars.AUDIO_BASE_URL }}" >> $GITHUB_ENV

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
